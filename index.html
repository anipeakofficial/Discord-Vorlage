<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Discord Knockoff Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=gg+sans:wght@400;500;600;700&display=swap');
        body { font-family: 'gg sans', sans-serif; background-color: #313338; color: #dbdee1; margin: 0; }
        .sidebar-icon { @apply w-12 h-12 bg-[#313338] rounded-[24px] flex items-center justify-center cursor-pointer transition-all duration-200 hover:rounded-[15px] hover:bg-[#5865f2] hover:text-white; }
        .active-chat { background-color: #3f4147 !important; color: white !important; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-[#313338]">
        <div class="bg-[#2b2d31] p-8 rounded-lg shadow-2xl w-full max-w-md">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-white">Willkommen zurück!</h2>
                <p class="text-gray-400 text-sm">Logge dich mit deiner Email ein.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Email</label>
                    <input type="email" id="auth-email" class="w-full bg-[#1e1f22] p-2.5 rounded outline-none border border-transparent focus:border-[#5865f2]">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Passwort</label>
                    <input type="password" id="auth-password" class="w-full bg-[#1e1f22] p-2.5 rounded outline-none border border-transparent focus:border-[#5865f2]">
                </div>
                <button onclick="handleLogin()" class="w-full bg-[#5865f2] text-white py-2.5 rounded font-bold hover:bg-[#4752c4] transition-colors">Anmelden</button>
                <div class="text-center mt-2">
                    <span class="text-gray-400 text-sm">Brauchst du einen Account?</span>
                    <button onclick="handleSignup()" class="text-sm text-[#00a8fc] hover:underline ml-1">Registrieren</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="hidden flex w-full h-full">
        <nav class="w-18 bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 flex-shrink-0 border-r border-black/20">
            <div class="sidebar-icon bg-[#5865f2] !text-white !rounded-[15px]"><b>D</b></div>
        </nav>

        <aside class="w-60 bg-[#2b2d31] flex flex-col flex-shrink-0">
            <div class="h-12 px-4 flex items-center shadow-md font-bold text-white border-b border-[#1e1f22]">Direktnachrichten</div>
            
            <div class="p-4">
                <input type="text" id="friend-input" placeholder="User-Email adden..." class="w-full bg-[#1e1f22] text-sm p-2 rounded outline-none text-gray-200">
                <button onclick="addFriend()" class="w-full mt-2 bg-[#23a559] text-xs py-1.5 rounded text-white font-bold hover:bg-[#1a7a42]">Freund hinzufügen</button>
            </div>

            <div id="friend-list" class="flex-1 overflow-y-auto px-2 space-y-1">
                <div onclick="selectChat('allgemein')" id="chat-allgemein" class="p-2 rounded cursor-pointer hover:bg-[#35373c] flex items-center group">
                    <span class="text-gray-400 mr-2 group-hover:text-gray-200">#</span> allgemein
                </div>
                </div>

            <div class="bg-[#232428] p-2 flex items-center space-x-2">
                <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-white text-xs" id="my-avatar">?</div>
                <div class="flex-1 overflow-hidden">
                    <div class="text-xs font-bold text-white truncate" id="my-name">User</div>
                    <div class="text-[10px] text-gray-400">Online</div>
                </div>
                <button onclick="logout()" title="Abmelden" class="p-1.5 hover:bg-[#3f4147] rounded text-gray-400 hover:text-red-400 transition-colors">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"></path></svg>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#313338]">
            <header class="h-12 flex items-center px-4 border-b border-[#1e1f22] shadow-sm font-bold text-white">
                <span id="current-chat-header" class="text-gray-400 mr-2">#</span>
                <span id="current-chat-name">allgemein</span>
            </header>
            <div id="messages-container" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
            <div class="p-4">
                <div class="bg-[#383a40] rounded-lg px-4 flex items-center">
                    <input type="text" id="chat-input" placeholder="Nachricht schreiben..." class="w-full bg-transparent py-3 outline-none text-gray-200">
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. SUPABASE KEYS (Bitte deine echten Keys hier rein!)
        const SB_URL = 'https://lgtpahhjbbuxnawingqs.supabase.co';
        const SB_KEY = 'sb_publishable_k1GFCx75w_ZdZTLUItzy5w__N8RxUt9';
        const _sb = supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let currentChat = 'allgemein';
        let friends = JSON.parse(localStorage.getItem('discord_friends') || '[]');

        // 2. AUTH FUNKTIONEN
        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { data, error } = await _sb.auth.signInWithPassword({ email, password });
            if (error) alert("Login Fehler: " + error.message);
            else setupApp(data.user);
        }

        async function handleSignup() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await _sb.auth.signUp({ email, password });
            if (error) alert("Fehler: " + error.message);
            else alert("Account erstellt! Du kannst dich jetzt einloggen (falls Confirm-Email aus ist).");
        }

        function logout() {
            _sb.auth.signOut();
            localStorage.removeItem('sb-lgtpahhjbbuxnawingqs-auth-token'); // Session löschen
            location.reload();
        }

        function setupApp(user) {
            currentUser = user;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('my-name').innerText = user.email.split('@')[0];
            document.getElementById('my-avatar').innerText = user.email[0].toUpperCase();
            renderFriendList();
            loadMessages();
            startRealtime();
        }

        // 3. CHAT & FREUNDE
        function addFriend() {
            const mail = document.getElementById('friend-input').value.trim();
            if (mail && mail !== currentUser.email && !friends.includes(mail)) {
                friends.push(mail);
                localStorage.setItem('discord_friends', JSON.stringify(friends));
                renderFriendList();
                document.getElementById('friend-input').value = "";
            }
        }

        function renderFriendList() {
            const list = document.getElementById('friend-list');
            const general = document.getElementById('chat-allgemein');
            
            // CSS Reset
            general.className = `p-2 rounded cursor-pointer hover:bg-[#35373c] flex items-center group ${currentChat === 'allgemein' ? 'active-chat' : ''}`;
            
            // Remove old friends
            const oldFriends = list.querySelectorAll('.friend-item');
            oldFriends.forEach(f => f.remove());

            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = `friend-item p-2 rounded cursor-pointer hover:bg-[#35373c] flex items-center ${currentChat === f ? 'active-chat' : ''}`;
                div.innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full mr-3"></span> ${f.split('@')[0]}`;
                div.onclick = () => {
                    currentChat = f;
                    document.getElementById('current-chat-header').innerText = "@";
                    document.getElementById('current-chat-name').innerText = f.split('@')[0];
                    renderFriendList();
                    loadMessages();
                };
                list.appendChild(div);
            });
        }

        function selectChat(target) {
            currentChat = target;
            document.getElementById('current-chat-header').innerText = "#";
            document.getElementById('current-chat-name').innerText = "allgemein";
            renderFriendList();
            loadMessages();
        }

        // 4. MESSAGES LOGIK
        async function loadMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = "";
            
            let query = _sb.from(currentChat === 'allgemein' ? 'messages' : 'private_messages').select('*');
            
            if (currentChat !== 'allgemein') {
                query = query.or(`and(sender.eq.${currentUser.email},receiver.eq.${currentChat}),and(sender.eq.${currentChat},receiver.eq.${currentUser.email})`);
            }

            const { data } = await query.order('id', { ascending: true });
            data?.forEach(m => displayMsg(m.username || m.sender, m.content));
        }

        function displayMsg(user, text) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = "group flex flex-col px-1 hover:bg-[#2e3035] rounded transition-colors";
            div.innerHTML = `
                <span class="text-[12px] font-bold text-white flex items-center">
                    ${user.split('@')[0]} 
                    <span class="ml-2 text-[10px] text-gray-500 font-normal">heute</span>
                </span>
                <span class="text-sm text-[#dbdee1]">${text}</span>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function startRealtime() {
            _sb.channel('global').on('postgres_changes', { event: 'INSERT', schema: 'public' }, payload => {
                if (currentChat === 'allgemein' && payload.table === 'messages') {
                    displayMsg(payload.new.username, payload.new.content);
                } else if (payload.table === 'private_messages') {
                    const isRelevant = (payload.new.sender === currentChat && payload.new.receiver === currentUser.email) ||
                                     (payload.new.sender === currentUser.email && payload.new.receiver === currentChat);
                    if (isRelevant) displayMsg(payload.new.sender, payload.new.content);
                }
            }).subscribe();
        }

        document.getElementById('chat-input').addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                const val = e.target.value;
                e.target.value = "";
                if (currentChat === 'allgemein') {
                    await _sb.from('messages').insert([{ username: currentUser.email, content: val }]);
                } else {
                    await _sb.from('private_messages').insert([{ sender: currentUser.email, receiver: currentChat, content: val }]);
                }
            }
        });

        // Check Session
        _sb.auth.getSession().then(({data}) => { if (data.session) setupApp(data.session.user); });

    </script>
</body>
</html>
