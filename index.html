<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone + Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #313338; color: white; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e1f22; border-radius: 4px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-20 bg-[#1e1f22] flex flex-col items-center py-3 space-y-2">
        <div class="w-12 h-12 bg-[#5865f2] rounded-2xl flex items-center justify-center cursor-pointer"><b>D</b></div>
    </aside>

    <aside class="w-60 bg-[#2b2d31] flex flex-col">
        <div class="h-12 border-b border-[#1e1f22] flex items-center px-4 font-bold shadow-sm">Server-Template</div>
        <div class="flex-1 p-2">
            <div class="text-gray-400 text-xs font-bold px-2 mb-2 mt-4 uppercase">Textkanäle</div>
            <div class="bg-[#3f4147] px-2 py-1.5 rounded flex items-center"># allgemein</div>
        </div>
        <div class="bg-[#232428] p-2 flex items-center space-x-2">
            <div id="user-avatar" class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-xs font-bold">?</div>
            <div class="text-xs">
                <div id="username-display" class="font-bold">Anonym</div>
                <div class="text-gray-400">Online</div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#313338]">
        <div class="h-12 border-b border-[#1e1f22] flex items-center px-4 font-bold"># allgemein</div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
        <div class="p-4">
            <input type="text" id="msg-input" placeholder="Nachricht schreiben..." class="w-full bg-[#383a40] p-3 rounded-lg outline-none">
        </div>
    </main>

    <script>
        // --- 1. SUPABASE SETUP ---
        const SUPABASE_URL = 'https://lgtpahhjbbuxnawingqs.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_k1GFCx75w_ZdZTLUItzy5w__N8RxUt9'; // <--- WICHTIG!
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. FAKE LOGIN ---
        let myUsername = localStorage.getItem('chat-username');
        if (!myUsername) {
            myUsername = prompt("Gib deinen Chat-Namen ein:") || "User" + Math.floor(Math.random() * 100);
            localStorage.setItem('chat-username', myUsername);
        }
        document.getElementById('username-display').innerText = myUsername;
        document.getElementById('user-avatar').innerText = myUsername.substring(0,2).toUpperCase();

        const input = document.getElementById('msg-input');
        const chat = document.getElementById('chat-messages');

        // Funktion zum Nachrichten anzeigen
        function renderMessage(user, content) {
            const div = document.createElement('div');
            div.className = "flex space-x-3 items-start";
            div.innerHTML = `
                <div class="w-10 h-10 bg-gray-500 rounded-full flex-shrink-0 flex items-center justify-center font-bold">${user.substring(0,1)}</div>
                <div>
                    <div class="font-bold text-sm">${user}</div>
                    <div class="text-gray-300 text-sm">${content}</div>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // --- 3. DATEN LADEN & ECHTZEIT ---
        async function init() {
            // Alte Nachrichten laden
            const { data } = await _supabase.from('messages').select('*').order('id', { ascending: true });
            if (data) data.forEach(m => renderMessage(m.username, m.content));

            // Echtzeit-Abo
            _supabase.channel('room1')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                renderMessage(payload.new.username, payload.new.content);
            })
            .subscribe();
        }

        // --- 4. SENDEN ---
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim() !== "") {
                const val = input.value;
                input.value = ""; // Input sofort leeren für besseres Feeling

                const { error } = await _supabase.from('messages').insert([
                    { username: myUsername, content: val }
                ]);
                
                if (error) {
                    console.error("Senden fehlgeschlagen:", error);
                    alert("Fehler: " + error.message);
                }
            }
        });

        init();
    </script>
</body>
</html>
